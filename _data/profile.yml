short_bio: >-
  <p>
    I am a CS graduate working in <b>Natural Language Processing (NLP)</b>, with a focus on Bengali and other 
    low-resource language technologies. My research spans Bengali mathematical reasoning, regional dialect 
    processing, named entity recognition, and harmful content detection. More recently, I have developed a 
    growing interest in <b>LLM reasoning</b> and <b>AI safety</b>, particularly in understanding how large 
    language models reason, fail, and behave in safety-critical settings.
    <br><br>
    🎓 I am actively looking for <b>PhD opportunities for Fall 2027</b> in NLP, LLM reasoning, and AI safety. 
    My long-term goal is to contribute to building robust, interpretable, and reliable AI systems, especially 
    for low-resource and multilingual settings. If my research interests align with your group, I would be glad 
    to connect 📩.
  </p>

